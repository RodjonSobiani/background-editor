<!doctype html>
<html lang="ru">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,400;0,500;0,700;1,100&display=swap"
          rel="stylesheet">
    <title>Новый вопрос</title>
</head>
<body style="margin: 0; padding: 0; font-family: Roboto, sans-serif; color: #333;">
<div style="max-width: 654px;">
    <div style="background-color: #212121; padding: 24px 0 24px 24px; margin-bottom: 48px; border-radius: 8px 8px 0 0;">
        <p style="color: white; font-size: 28px; font-weight: 500; margin: 0;">
            Background-editor
        </p>
    </div>
    <div style="margin: 0 46px 64px;">
        <div>
            <h1>Новый вопрос от пользователя</h1>
            <p style="font-size: 16px; margin: 0;"><strong>Имя:</strong> {{name}}</p>
            <p style="font-size: 16px; margin: 0;"><strong>Email:</strong> {{email}}</p>
            <p style="font-size: 16px; margin: 0;"><strong>Вопрос:</strong> {{question}}</p>
        </div>
    </div>
</div>
</body>
</html>
